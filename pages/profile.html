<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Books.ua</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../script/profile.js" defer></script>
</head>

<body>
  <header class="siteHeader">
  </header>

  <main>
    <div class="footerInner container">
        <div class="footerRight" id="reg">
            <h4 class="profileFormText">Профіль</h4>
            <form class="profileForm">
                <label class="label">Пошта</label>
                <input id="email" type="text" name="email" required class="input" disabled>

                <label class="label">Ім'я</label>
                <input id="name" type="text" name="name" required class="input" disabled>

                <button type="submit" class="btn change">Редагувати</button>
                <button type="submit" class="btn save">Зберегти</button>
            </form>
        </div>
    </div>
  </main>
</body>
</html>
